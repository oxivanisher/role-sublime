---
- name: Ensure python3-debian is installed
  ansible.builtin.package:
    name: python3-debian
    state: present
  become: true

- name: Download Sublime Text GPG key
  ansible.builtin.get_url:
    url: https://download.sublimetext.com/sublimehq-pub.gpg
    dest: /etc/apt/keyrings/sublimetext.gpg
    mode: '0644'
  become: true

- name: Add Sublime Text apt repository
  ansible.builtin.deb822_repository:
    name: sublimetext
    types: [deb]
    uris: "https://download.sublimetext.com/"
    suites: ["apt/stable/"]
    signed_by: /etc/apt/keyrings/sublimetext.gpg
    state: present
    enabled: true
  become: true

- name: Install Sublime-Text
  ansible.builtin.apt:
    name: sublime-text
    update_cache: true
    state: present
  ignore_errors: "{{ ansible_check_mode }}"
  become: true

- name: Configure sublime as default application
  ansible.builtin.include_tasks: set_default_app.yml
  loop: "{{ sublime_os_users }}"
